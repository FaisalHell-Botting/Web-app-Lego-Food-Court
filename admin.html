<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الكاشير | LE Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #F8F9FA; } .hidden { display: none !important; }</style>
</head>
<body class="text-[#2E3468] pb-10">

<header class="bg-[#2E3468] text-white p-4 shadow-lg sticky top-0 z-50">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-black flex items-center gap-2">
                <img src="logo.png" alt="Logo" class="h-8 bg-white rounded object-contain">
                لوحة الكاشير
            </h1>
            <button onclick="fetchData()" class="bg-[#F7CC46] text-[#2E3468] px-4 py-1.5 rounded-lg font-bold">🔄 تحديث</button>
        </div>
        <div class="flex gap-2 overflow-x-auto">
            <button onclick="switchTab('active')" class="font-bold px-4 py-2 rounded-lg bg-[#F7CC46] text-[#2E3468]">🟡 الجارية</button>
            <button onclick="switchTab('ledger')" class="font-bold px-4 py-2 rounded-lg text-gray-300">📋 سجل الديون</button>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto p-4 mt-2">
    <div id="view_active">
        <div id="activeOrdersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>

    <div id="view_ledger" class="hidden">
        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <table class="w-full text-right text-sm">
                <thead class="bg-gray-50 border-b">
                    <tr class="text-gray-500 text-xs">
                        <th class="p-4 font-bold">المكتب</th>
                        <th class="p-4 font-bold">الإجمالي</th>
                        <th class="p-4 font-bold">إجراء</th>
                    </tr>
                </thead>
                <tbody id="ledgerList" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>
</main>

<script>
    const API_URL = 'https://web-app-lego-food-court.onrender.com/api'; // ضع رابط الرندر هنا

    async function fetchData() {
        let res = await fetch(`${API_URL}/api/admin/data`);
        let data = await res.json();
        
        // Render Active Orders
        let activeHtml = '';
        data.active_orders.forEach(order => {
            let isPaymentRequest = order.status === 'طلب_تسديد';
            let itemsTxt = isPaymentRequest ? `مبلغ التسديد: ${order.total} ₪` : order.items.map(i => `${i.qty}x ${i.name}`).join('<br>');
            
            activeHtml += `<div class="bg-white p-4 rounded-xl border-2 ${isPaymentRequest ? 'border-green-400 bg-green-50' : 'border-gray-200'} shadow-sm">
                <div class="flex justify-between items-center mb-2">
                    <span class="font-black text-lg ${isPaymentRequest ? 'text-green-700' : ''}">
                        ${isPaymentRequest ? '💰 تسديد دين' : `مكتب ${order.location}`}
                    </span>
                    <span class="text-xs text-gray-500">${order.time || ''}</span>
                </div>
                ${!isPaymentRequest ? `<span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded mb-2 inline-block">${order.delivery_type}</span>` : ''}
                <div class="text-sm font-bold mb-4 ${isPaymentRequest ? 'text-green-800 text-xl' : ''}">${itemsTxt}</div>
                
                ${isPaymentRequest && order.receipt_image ? `
                    <a href="${API_URL}${order.receipt_image}" target="_blank" class="block mb-4 text-xs text-blue-600 underline">عرض المرفق 📄</a>
                ` : ''}

                <div class="flex gap-2">
                    ${isPaymentRequest ? `
                        <button onclick="adminAction('confirm_payment', ${order.id})" class="flex-1 bg-green-500 text-white py-2 rounded-lg font-bold text-sm">✅ تأكيد الدفع</button>
                    ` : `
                        <button onclick="adminAction('approve', ${order.id})" class="flex-1 bg-[#F7CC46] text-[#2E3468] py-2 rounded-lg font-bold text-sm">✅ موافق (تسجيل دين)</button>
                    `}
                    <button onclick="adminAction('cancel', ${order.id})" class="px-4 bg-gray-100 text-red-500 rounded-lg font-bold">❌</button>
                </div>
            </div>`;
        });
        document.getElementById('activeOrdersList').innerHTML = activeHtml || '<p class="text-gray-400">لا يوجد طلبات جارية</p>';
        
        // Render Ledger
        let ledgerHtml = '';
        data.debts.forEach(debt => {
            if(debt.amount > 0) {
                ledgerHtml += `<tr>
                    <td class="p-4 font-black">مكتب ${debt.office}</td>
                    <td class="p-4 text-red-500 font-bold">${debt.amount} ₪</td>
                    <td class="p-4">
                        <button onclick="sendReminder('${debt.office}')" class="bg-blue-100 text-blue-600 px-3 py-1 rounded text-xs font-bold hover:bg-blue-200">🔔 إرسال تذكير</button>
                    </td>
                </tr>`;
            }
        });
        document.getElementById('ledgerList').innerHTML = ledgerHtml || '<tr><td colspan="3" class="text-center p-4 text-gray-400">لا توجد ديون عالقة</td></tr>';
    }

    async function adminAction(action, order_id) {
        await fetch(`${API_URL}/api/admin/action`, {
            method: 'POST', headers:{'Content-Type': 'application/json'},
            body: JSON.stringify({action, order_id})
        });
        fetchData();
    }

    async function sendReminder(office) {
        await fetch(`${API_URL}/api/admin/action`, {
            method: 'POST', headers:{'Content-Type': 'application/json'},
            body: JSON.stringify({action: 'remind', office})
        });
        alert(`تم إرسال تذكير لمكتب ${office}`);
    }

    function switchTab(tab) {
        document.getElementById('view_active').classList.toggle('hidden', tab !== 'active');
        document.getElementById('view_ledger').classList.toggle('hidden', tab !== 'ledger');
    }

    setInterval(fetchData, 10000);
    fetchData();
</script>
</body>
</html>
