<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الكاشير | LE Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #F8F9FA; } .hidden { display: none !important; }</style>
</head>
<body class="text-navy pb-10">

    <header class="bg-[#2E3468] text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold flex items-center gap-2">👨‍💻 الكاشير</h1>
                <button onclick="fetchData()" class="bg-[#F7CC46] text-[#2E3468] px-4 py-1.5 rounded-lg font-bold text-sm">تحديث</button>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4 text-center">
                <div class="bg-white/10 p-3 rounded-lg"><p class="text-xs text-gray-300">المبيعات الإجمالية</p><p id="s_sales" class="font-bold text-lg">0 ₪</p></div>
                <div class="bg-white/10 p-3 rounded-lg"><p class="text-xs text-gray-300">إجمالي الطلبات</p><p id="s_count" class="font-bold text-lg">0</p></div>
                <div class="bg-white/10 p-3 rounded-lg"><p class="text-xs text-green-300">فواتير مدفوعة</p><p id="s_paid" class="font-bold text-lg text-green-400">0 ₪</p></div>
                <div class="bg-white/10 p-3 rounded-lg"><p class="text-xs text-red-300">ديون عالقة</p><p id="s_debt" class="font-bold text-lg text-red-400">0 ₪</p></div>
            </div>

            <div class="flex gap-4 overflow-x-auto border-b border-white/20 pb-1">
                <button onclick="switchTab('active')" id="tab_active" class="font-bold border-b-2 border-[#F7CC46] pb-2 text-white whitespace-nowrap">الطلبات الجارية</button>
                <button onclick="switchTab('ledger')" id="tab_ledger" class="font-bold text-gray-400 pb-2 border-b-2 border-transparent whitespace-nowrap">سجل الديون</button>
                <button onclick="switchTab('reviews')" id="tab_reviews" class="font-bold text-gray-400 pb-2 border-b-2 border-transparent whitespace-nowrap">التقييمات</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 mt-2">
        <div id="view_active">
            <div id="activeOrdersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="view_ledger" class="hidden">
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden overflow-x-auto">
                <table class="w-full text-right text-sm">
                    <thead class="bg-gray-100"><tr class="text-gray-600"><th class="p-3">المكتب</th><th class="p-3">الإجمالي</th><th class="p-3">الحالة</th><th class="p-3">إجراء</th></tr></thead>
                    <tbody id="ledgerList" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>

        <div id="view_reviews" class="hidden">
            <div id="reviewsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </main>

    <div id="missingPromptModal" class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm">
            <h3 class="font-bold mb-3 text-[#2E3468]">تحديد الصنف الناقص</h3>
            <input type="text" id="missingItemInput" placeholder="مثال: كوكاكولا" class="w-full border-2 p-2 rounded-xl mb-4 focus:outline-none focus:border-red-500">
            <button onclick="submitMissing()" class="w-full bg-red-500 text-white py-3 rounded-xl font-bold mb-2">إرسال التنبيه للموظف</button>
            <button onclick="document.getElementById('missingPromptModal').classList.add('hidden')" class="w-full bg-gray-100 text-gray-600 py-3 rounded-xl font-bold">إلغاء</button>
        </div>
    </div>

    <script>
        // ⚠️ تأكد من وضع الرابط الخاص بك هنا
        const API_URL = "https://web-app-lego-food-court.onrender.com/api"; 
        
        let targetMissingOrder = null;

        function switchTab(tab) {
            ['active', 'ledger', 'reviews'].forEach(t => {
                document.getElementById(`view_${t}`).classList.add('hidden');
                document.getElementById(`tab_${t}`).className = 'font-bold text-gray-400 pb-2 border-b-2 border-transparent whitespace-nowrap';
            });
            document.getElementById(`view_${tab}`).classList.remove('hidden');
            document.getElementById(`tab_${tab}`).className = 'font-bold border-b-2 border-[#F7CC46] pb-2 text-white whitespace-nowrap';
        }

        async function fetchData() {
            try {
                const res = await fetch(`${API_URL}/admin/dashboard`);
                const data = await res.json();
                
                document.getElementById('s_sales').innerText = data.stats.total_sales + ' ₪';
                document.getElementById('s_count').innerText = data.stats.total_count;
                document.getElementById('s_paid').innerText = data.stats.paid_invoices + ' ₪';
                document.getElementById('s_debt').innerText = data.stats.total_debts + ' ₪';

                const list = document.getElementById('activeOrdersList');
                if(data.active_orders.length === 0) {
                    list.innerHTML = `<p class="text-gray-400 text-center col-span-full py-10">لا توجد طلبات جارية ✅</p>`;
                } else {
                    list.innerHTML = data.active_orders.map(o => {
                        let buttonsHTML = '';
                        if (o.status === 'مقبول') {
                            buttonsHTML = `<div class="col-span-2 bg-green-100 text-green-700 text-center py-2.5 rounded-lg text-sm font-bold border border-green-200">تمت الموافقة ✅</div>`;
                        } else {
                            buttonsHTML = `
                                <button onclick="action('approve', ${o.id})" class="bg-[#2E3468] text-white py-2.5 rounded-lg text-sm font-bold shadow hover:bg-opacity-90">✅ موافقة</button>
                                <button onclick="promptMissing(${o.id})" class="border-2 border-red-100 text-red-500 py-2.5 rounded-lg text-sm font-bold hover:bg-red-50">❌ صنف ناقص</button>
                            `;
                        }
                        
                        return `
                        <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm flex flex-col">
                            <div class="flex justify-between mb-3"><span class="font-bold text-[#2E3468]">#${o.id} - ${o.location}</span><span class="text-xs bg-blue-50 border border-blue-100 text-blue-800 px-2 py-1 rounded">${o.order_type}</span></div>
                            <p class="text-[#2E3468] mb-4 text-sm bg-gray-50 p-3 rounded-lg leading-relaxed font-bold border-r-4 border-[#F7CC46]">${o.details}</p>
                            <div class="flex justify-between items-center mb-4"><span class="text-xs text-gray-400">الإجمالي:</span><span class="font-bold text-lg">${o.total_price} ₪</span></div>
                            <div class="grid grid-cols-2 gap-2 mt-auto">
                                ${buttonsHTML}
                            </div>
                        </div>
                        `;
                    }).join('');
                }

                document.getElementById('ledgerList').innerHTML = data.debts.map(d => `
                    <tr>
                        <td class="p-3 font-bold text-[#2E3468]">${d.office}</td>
                        <td class="p-3 text-lg font-bold ${d.status==='غير مدفوع'?'text-red-500':'text-green-500'}">${d.amount} ₪</td>
                        <td class="p-3 text-xs"><span class="px-2 py-1 rounded font-bold ${d.status==='غير مدفوع'?'bg-red-50 text-red-600':'bg-green-50 text-green-600'}">${d.status}</span></td>
                        <td class="p-3">${d.status === 'غير مدفوع' ? `<button onclick="action('remind', null, '${d.office}')" class="bg-[#F7CC46] text-[#2E3468] px-3 py-1.5 text-xs rounded-lg font-bold shadow">تذكير 🔔</button>` : '-'}</td>
                    </tr>
                `).join('');

                document.getElementById('reviewsList').innerHTML = data.reviews.map(r => `
                    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
                        <div class="flex justify-between items-center mb-2"><span class="font-bold text-sm text-[#2E3468]">${r.office}</span><span class="text-yellow-400 text-sm">${'⭐'.repeat(r.rating)}</span></div>
                        <p class="text-xs text-gray-500 mb-2 leading-relaxed">${r.details}</p>
                        ${r.text ? `<p class="text-sm bg-gray-50 p-3 rounded-lg text-[#2E3468] italic border-r-4 border-yellow-400">"${r.text}"</p>` : ''}
                        <p class="text-xs text-gray-400 mt-2 text-left">${r.date}</p>
                    </div>
                `).join('');

            } catch (e) {}
        }

        async function action(act, id, office=null, note=null) {
            await fetch(`${API_URL}/admin/action`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: act, order_id: id, office: office, note: note }) });
            if(act === 'remind') alert("تم إرسال تنبيه للمكتب بفتح السداد.");
            fetchData();
        }

        function promptMissing(id) { targetMissingOrder = id; document.getElementById('missingItemInput').value = ''; document.getElementById('missingPromptModal').classList.remove('hidden'); }
        function submitMissing() { const note = document.getElementById('missingItemInput').value; if(note) { action('missing', targetMissingOrder, null, note); document.getElementById('missingPromptModal').classList.add('hidden'); } }

        setInterval(fetchData, 10000);
        fetchData();
    </script>
</body>
</html>
