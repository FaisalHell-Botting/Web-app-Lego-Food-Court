<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | LE Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { navy: '#2E3468', gold: '#F7CC46' }, fontFamily: { sans: ['Cairo', 'sans-serif'] } } }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans text-navy">

    <header class="bg-navy text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="logo.png" alt="Logo" class="h-10 brightness-0 invert">
                <h1 class="text-xl font-bold">لوحة تحكم الطلبات</h1>
            </div>
            <div class="flex gap-4">
                <button onclick="fetchOrders()" class="bg-gold text-navy px-4 py-2 rounded-lg font-bold hover:bg-yellow-400 transition">🔄 تحديث</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 sm:p-6">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8 text-center">
            <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-gold">
                <p class="text-gray-500 text-sm font-bold">طلبات بانتظار التأكيد</p>
                <p id="pendingCount" class="text-3xl font-bold mt-1">0</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-green-500">
                <p class="text-gray-500 text-sm font-bold">مبيعات اليوم</p>
                <p id="todaySales" class="text-3xl font-bold mt-1 text-green-600">0 ₪</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-b-4 border-navy">
                <p class="text-gray-500 text-sm font-bold">ديون لم تُسدد</p>
                <p id="totalDebts" class="text-3xl font-bold mt-1 text-red-500">0 ₪</p>
            </div>
        </div>

        <h2 class="text-lg font-bold mb-4 flex items-center gap-2">🚨 الطلبات الواردة</h2>
        
        <div id="ordersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        // --- غيّر هذا الرابط برابط السيرفر تبعك على Render ---
        const API_URL = "https://lego-food-bot.onrender.com/api";

        async function fetchOrders() {
            try {
                const res = await fetch(`${API_URL}/admin/orders`);
                const data = await res.json();
                renderOrders(data.orders);
                updateStats(data.stats);
            } catch (e) { console.error("Error fetching orders", e); }
        }

        function renderOrders(orders) {
            const list = document.getElementById('ordersList');
            if (orders.length === 0) {
                list.innerHTML = '<p class="text-gray-400 col-span-full text-center py-10">لا توجد طلبات جديدة حالياً...</p>';
                return;
            }

            list.innerHTML = orders.map(order => `
                <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-gray-100 flex flex-col h-full">
                    <div class="p-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                        <span class="font-bold text-navy">طلب #${order.id}</span>
                        <span class="text-xs text-gray-500">${order.timestamp}</span>
                    </div>
                    <div class="p-5 flex-grow">
                        <p class="text-sm text-gray-500 font-bold mb-1">📍 المكان:</p>
                        <p class="text-lg font-bold mb-4">${order.location}</p>
                        
                        <p class="text-sm text-gray-500 font-bold mb-1">📦 الطلب:</p>
                        <ul class="text-navy space-y-1 mb-4">
                            ${order.details.split(',').map(item => `<li class="flex items-center gap-2">🔹 ${item}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="p-4 bg-gray-50 border-t border-gray-100 mt-auto">
                        <div class="flex justify-between items-center mb-4">
                            <span class="font-bold text-gray-600">الإجمالي:</span>
                            <span class="text-xl font-bold text-gold">${order.total_price} ₪</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="updateStatus(${order.id}, 'مقبول')" class="bg-navy text-white font-bold py-2 rounded-xl hover:bg-opacity-90 transition">✅ تأكيد</button>
                            <button onclick="updateStatus(${order.id}, 'صنف ناقص')" class="bg-white border-2 border-red-200 text-red-500 font-bold py-2 rounded-xl hover:bg-red-50 transition">❌ ناقص</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(orderId, newStatus) {
            try {
                await fetch(`${API_URL}/admin/update_status`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: orderId, status: newStatus })
                });
                fetchOrders(); // تحديث القائمة بعد التغيير
            } catch (e) { alert("خطأ في التحديث"); }
        }

        function updateStats(stats) {
            document.getElementById('pendingCount').innerText = stats.pending;
            document.getElementById('todaySales').innerText = stats.sales + ' ₪';
            document.getElementById('totalDebts').innerText = stats.debts + ' ₪';
        }

        // تحديث تلقائي كل 30 ثانية
        setInterval(fetchOrders, 30000);
        fetchOrders(); // تحميل أول مرة
    </script>
</body>
</html>
