<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | LE Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { navy: '#2E3468', gold: '#F7CC46', light: '#F8F9FA' }, 
                    fontFamily: { sans: ['Cairo', 'sans-serif'] } 
                } 
            }
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #F8F9FA; }
    </style>
</head>
<body class="text-navy pb-10">

    <header class="bg-navy text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="logo.png" alt="Logo" class="h-10 brightness-0 invert" onerror="this.style.display='none'">
                <h1 class="text-xl font-bold">لوحة تحكم الكاشير</h1>
            </div>
            <button onclick="fetchOrders()" class="bg-gold text-navy px-5 py-2 rounded-xl font-bold hover:bg-yellow-400 transition flex items-center gap-2">
                🔄 تحديث البيانات
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 sm:p-6">
        
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8 text-center">
            <div class="bg-white p-5 rounded-2xl shadow-sm border-b-4 border-green-500">
                <p class="text-gray-500 text-sm font-bold">أرباح آخر 7 أيام</p>
                <p id="sales7Days" class="text-3xl font-bold mt-2 text-green-600">0 ₪</p>
            </div>
            
            <div class="bg-white p-5 rounded-2xl shadow-sm border-b-4 border-navy text-navy">
                <p class="text-gray-500 text-sm font-bold">إجمالي فواتير الكوفي</p>
                <p id="totalInvoices" class="text-3xl font-bold mt-2">0 ₪</p>
            </div>
            
            <div class="bg-white p-5 rounded-2xl shadow-sm border-b-4 border-red-500">
                <p class="text-gray-500 text-sm font-bold">إجمالي الديون المعلقة</p>
                <p id="totalDebts" class="text-3xl font-bold mt-2 text-red-500">0 ₪</p>
            </div>
        </div>

        <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
            <span class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></span>
            الطلبات الجارية الآن
        </h2>
        
        <div id="ordersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="text-gray-400 col-span-full text-center py-10">جاري تحميل الطلبات...</p>
        </div>
    </main>

    <script>
        // الرابط الخاص بـ Web Service الجديدة (الباك إند)
        const API_URL = "https://web-app-lego-food-court.onrender.com/api"; 

        async function fetchOrders() {
            try {
                const res = await fetch(`${API_URL}/admin/active_orders`);
                const data = await res.json();
                
                if (data.status === "error") {
                    console.error("Error from server:", data.message);
                    return;
                }

                renderOrders(data.orders);
                updateStats(data.stats);
            } catch (e) {
                console.error("Connection Error:", e);
                document.getElementById('ordersList').innerHTML = '<p class="text-red-500 col-span-full text-center py-10">خطأ في الاتصال بالسيرفر</p>';
            }
        }

        function updateStats(stats) {
            if (!stats) return;
            document.getElementById('sales7Days').innerText = (stats.sales_7_days || 0) + ' ₪';
            document.getElementById('totalInvoices').innerText = (stats.total_invoices || 0) + ' ₪';
            document.getElementById('totalDebts').innerText = (stats.total_debts || 0) + ' ₪';
        }

        function renderOrders(orders) {
            const list = document.getElementById('ordersList');
            if (!orders || orders.length === 0) {
                list.innerHTML = '<p class="text-gray-400 col-span-full text-center py-10">لا توجد طلبات جارية حالياً ✅</p>';
                return;
            }

            list.innerHTML = orders.map(order => `
                <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-gray-100 flex flex-col h-full hover:shadow-lg transition">
                    <div class="p-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                        <span class="font-bold text-navy">طلب #${order.id}</span>
                        <span class="text-xs text-gray-500">${order.timestamp}</span>
                    </div>
                    <div class="p-5 flex-grow">
                        <div class="mb-4">
                            <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">📍 الموقع / المكتب</p>
                            <p class="text-lg font-bold text-navy">${order.location}</p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">📦 الأصناف المطلوبة</p>
                            <p class="text-md text-navy leading-relaxed">${order.details}</p>
                        </div>
                    </div>
                    <div class="p-4 bg-gray-50 border-t border-gray-100 mt-auto">
                        <div class="flex justify-between items-center mb-4">
                            <span class="font-bold text-gray-600">الحساب الإجمالي:</span>
                            <span class="text-2xl font-bold text-gold">${order.total_price} ₪</span>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="updateStatus(${order.id}, 'مقبول')" class="bg-navy text-white font-bold py-3 rounded-xl hover:bg-opacity-90 transition shadow-md shadow-navy/10">✅ تأكيد</button>
                            <button onclick="updateStatus(${order.id}, 'صنف ناقص')" class="bg-white border-2 border-red-100 text-red-500 font-bold py-3 rounded-xl hover:bg-red-50 transition">❌ ناقص</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(orderId, newStatus) {
            try {
                const response = await fetch(`${API_URL}/admin/update_status`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: orderId, status: newStatus })
                });
                
                if (response.ok) {
                    fetchOrders(); // تحديث القائمة فوراً
                } else {
                    alert("فشل في تحديث حالة الطلب");
                }
            } catch (e) {
                alert("خطأ في الشبكة");
            }
        }

        // تحديث البيانات تلقائياً كل 15 ثانية
        setInterval(fetchOrders, 15000);
        
        // التحميل الأول عند فتح الصفحة
        fetchOrders();
    </script>
</body>
</html>
