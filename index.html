<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LE Coffee | اطلب الآن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{colors:{navy:'#2E3468',gold:'#F7CC46'},fontFamily:{sans:['Cairo','sans-serif']}}}}</script>
    <style>body{font-family:'Cairo',sans-serif;background-color:#F8F9FA;}.hidden-screen{display:none !important;}</style>
</head>
<body class="pb-32">

    <div id="authScreen" class="fixed inset-0 bg-navy z-[100] flex flex-col items-center justify-center p-6 text-white text-center">
        <img src="logo.png" class="h-24 mb-6">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-navy shadow-2xl">
            <h2 class="text-2xl font-bold mb-6">تسجيل الدخول</h2>
            <input type="text" id="loginOffice" placeholder="رقم المكتب (مثلاً: 15)" class="w-full border-2 p-3 rounded-xl mb-4 text-center font-bold text-lg focus:outline-none focus:border-gold">
            <button onclick="login('office')" class="w-full bg-navy text-white font-bold py-3 rounded-xl mb-3 shadow-lg">دخول للمكتب</button>
            <button onclick="login('guest')" class="w-full border-2 border-gold text-gold font-bold py-3 rounded-xl">دخول كزائر</button>
        </div>
    </div>

    <header id="mainHeader" class="bg-white shadow-sm p-4 sticky top-0 z-40 hidden-screen">
        <div class="flex items-center justify-between max-w-md mx-auto">
            <span id="userBadge" class="bg-gold text-navy text-xs font-bold px-3 py-1 rounded-full"></span>
            <button onclick="toggleLedger()" class="text-xs font-bold text-navy underline">سجل ديوني والطلبات</button>
        </div>
    </header>

    <div id="activeOrderBanner" class="max-w-md mx-auto p-4 hidden-screen">
        <div class="bg-blue-50 border-2 border-blue-200 p-5 rounded-2xl shadow-sm relative">
            <h3 class="font-bold text-blue-800 mb-2">⏳ طلبك قيد الانتظار...</h3>
            <p id="activeOrderText" class="text-sm text-navy mb-4 font-bold bg-white p-3 rounded-lg border border-blue-50"></p>
            <div class="flex gap-2">
                <button onclick="editActiveOrder()" class="flex-1 bg-navy text-white py-2 rounded-xl text-sm font-bold shadow">✏️ تعديل</button>
                <button onclick="cancelActiveOrder()" class="flex-1 bg-red-50 text-red-600 py-2 rounded-xl text-sm font-bold">❌ إلغاء</button>
            </div>
        </div>
    </div>

    <main id="mainScreen" class="max-w-md mx-auto p-4 space-y-4 hidden-screen">
        <div class="bg-navy p-5 rounded-2xl text-white shadow-md">
            <h2 class="font-bold mb-2 text-xs">🤖 اطلب بالذكاء الاصطناعي</h2>
            <textarea id="aiInput" placeholder="اكتب: بدي شاي وقهوة وسط..." class="w-full bg-white/10 rounded-xl p-3 text-white text-sm focus:outline-none resize-none" rows="2"></textarea>
            <button onclick="sendAI()" id="aiBtn" class="mt-2 w-full bg-gold text-navy font-bold py-2 rounded-xl text-xs">تحليل الطلب</button>
        </div>
        <div id="menuContainer" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="cartBar" class="fixed bottom-0 left-0 w-full bg-white border-t p-4 shadow-lg transform translate-y-full transition-transform z-40 hidden-screen">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div><p class="text-xs text-gray-400 font-bold">المجموع</p><p id="totalPrice" class="font-bold text-xl text-navy">0 ₪</p></div>
            <button onclick="processOrder()" class="bg-navy text-white px-10 py-3 rounded-xl font-bold shadow-xl">تأكيد الطلب</button>
        </div>
    </div>

    <div id="ledgerScreen" class="fixed inset-0 bg-gray-50 z-[90] p-4 overflow-y-auto hidden-screen pt-20">
        <div class="max-w-md mx-auto">
            <button onclick="toggleLedger()" class="mb-4 font-bold text-navy">⬅️ رجوع</button>
            <div class="bg-white p-6 rounded-3xl shadow-sm text-center border-t-4 border-red-500 mb-6">
                <p class="text-gray-400 font-bold">إجمالي ديونك</p>
                <p id="ledgerTotalDebt" class="text-4xl font-bold text-red-500 my-2">0 ₪</p>
                <button id="btnPayDebt" onclick="payDebt()" class="hidden-screen w-full bg-green-500 text-white font-bold py-3 rounded-xl shadow-lg mt-2">تسديد الديون الآن</button>
            </div>
            <h3 class="font-bold mb-4 text-navy">سجل الطلبات</h3>
            <div id="ledgerList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://web-app-lego-food-court.onrender.com/api"; // عدل هذا الرابط لخدمتك
        let user = { id: '' }, cart = {}, activeOrderId = null, rawDetails = '';

        const menu = [
            { id: '1', name: 'شاي', price: 1 }, { id: '2', name: 'قهوة مزاج وسط', price: 2 },
            { id: '3', name: 'قهوة مزاج كبير', price: 3 }, { id: '4', name: 'كوكاكولا', price: 4 },
            { id: '5', name: 'سندويش فينو فيتا', price: 3 }, { id: '6', name: 'سنيكرز', price: 3 }
        ];

        function login(type) {
            const val = document.getElementById('loginOffice').value;
            if (type === 'office' && !val) return alert("أدخل رقم المكتب");
            user.id = type === 'office' ? "مكتب " + val : "زائر-" + Math.floor(Math.random()*100);
            document.getElementById('userBadge').innerText = user.id;
            document.getElementById('authScreen').classList.add('hidden-screen');
            ['mainHeader','mainScreen'].forEach(id => document.getElementById(id).classList.remove('hidden-screen'));
            renderMenu(); poll(); setInterval(poll, 10000);
        }

        function renderMenu() {
            const cont = document.getElementById('menuContainer');
            cont.innerHTML = menu.map(item => {
                const qty = cart[item.id] || 0;
                return `<div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-50">
                    <h3 class="font-bold text-sm mb-1">${item.name}</h3><p class="text-gold font-bold text-xs">${item.price} ₪</p>
                    <button onclick="addToCart('${item.id}', 1)" class="mt-3 w-full border border-navy rounded-lg py-1 text-xs font-bold ${qty>0?'bg-navy text-white':''}">
                        ${qty > 0 ? 'مضاف ('+qty+')' : 'إضافة'}
                    </button>
                </div>`;
            }).join('');
        }

        function addToCart(id, change) {
            cart[id] = (cart[id] || 0) + change;
            if (cart[id] <= 0) delete cart[id];
            renderMenu(); updateCartBar();
        }

        function updateCartBar() {
            let total = 0, qty = 0;
            Object.entries(cart).forEach(([id, count]) => {
                total += menu.find(m => m.id === id).price * count;
                qty += count;
            });
            document.getElementById('totalPrice').innerText = total + " ₪";
            const bar = document.getElementById('cartBar');
            (qty > 0 && !activeOrderId) ? bar.classList.remove('hidden-screen','translate-y-full') : bar.classList.add('hidden-screen','translate-y-full');
        }

        async function processOrder() {
            let items = [];
            Object.entries(cart).forEach(([id, qty]) => {
                const item = menu.find(m => m.id === id);
                for (let i=0; i<qty; i++) items.push(item.name);
            });
            const res = await fetch(`${API_URL}/order`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ office: user.id, items: items, total_price: parseInt(document.getElementById('totalPrice').innerText) })
            });
            if (res.ok) {
                alert("✅ تم إرسال الطلب بنجاح!");
                cart = {}; updateCartBar(); poll();
            }
        }

        async function poll() {
            try {
                const res = await fetch(`${API_URL}/user/sync/${encodeURIComponent(user.id)}`);
                const data = await res.json();
                
                if (data.active_order) {
                    activeOrderId = data.active_order.id;
                    rawDetails = data.active_order.details;
                    document.getElementById('activeOrderText').innerText = data.active_order.details;
                    document.getElementById('activeOrderBanner').classList.remove('hidden-screen');
                    document.getElementById('cartBar').classList.add('hidden-screen');
                } else {
                    activeOrderId = null;
                    document.getElementById('activeOrderBanner').classList.add('hidden-screen');
                    updateCartBar();
                }

                document.getElementById('ledgerTotalDebt').innerText = data.total_debt + " ₪";
                document.getElementById('btnPayDebt').classList.toggle('hidden-screen', !data.can_pay_debt);
                
                document.getElementById('ledgerList').innerHTML = data.orders.map(o => `
                    <div class="bg-white p-4 rounded-xl border flex justify-between items-center">
                        <div class="text-xs font-bold text-navy">
                            <p>${o.details}</p><p class="text-gray-400 mt-1">${o.timestamp}</p>
                        </div>
                        <div class="text-left font-bold">
                            <p>${o.total_price} ₪</p><p class="${o.is_paid?'text-green-500':'text-red-500'} text-[10px]">${o.is_paid?'مسدد':'دين'}</p>
                        </div>
                    </div>
                `).join('');
            } catch(e) {}
        }

        async function editActiveOrder() {
            if (!confirm("سيتم إلغاء الطلب لإعادته للسلة، موافق؟")) return;
            await fetch(`${API_URL}/user/action`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'cancel', order_id: activeOrderId }) });
            cart = {};
            rawDetails.split(', ').forEach(name => {
                const item = menu.find(m => m.name === name);
                if (item) cart[item.id] = (cart[item.id] || 0) + 1;
            });
            poll();
        }

        async function cancelActiveOrder() {
            if (!confirm("هل تريد إلغاء الطلب نهائياً؟")) return;
            await fetch(`${API_URL}/user/action`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'cancel', order_id: activeOrderId }) });
            poll();
        }

        function toggleLedger() { document.getElementById('ledgerScreen').classList.toggle('hidden-screen'); poll(); }
    </script>
</body>
</html>
