<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LE Coffee | كوفي كورنر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#2E3468', 
                        gold: '#F7CC46', 
                        light: '#F8F9FA'
                    },
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #F8F9FA; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-navy pb-28">

    <header class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="flex items-center justify-between max-w-md mx-auto">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="LE Logo" class="h-10 object-contain">
                <h1 class="font-bold text-lg border-r-2 border-gray-200 pr-3">كوفي كورنر</h1>
            </div>
            <button class="bg-gray-100 p-2 rounded-full text-navy hover:bg-gray-200 transition">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                </svg>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <label class="block text-sm font-bold mb-2 text-gray-600">📍 رقم مكتبك (أو اسمك)</label>
            <input type="text" id="officeNumber" placeholder="مثال: 15" class="w-full border-2 border-gray-100 rounded-xl p-3 focus:outline-none focus:border-navy focus:ring-1 focus:ring-navy transition-all bg-gray-50">
        </div>

        <div class="bg-navy text-white p-5 rounded-2xl shadow-md relative overflow-hidden">
            <div class="absolute top-0 right-0 w-2 h-full bg-gold"></div>
            <h2 class="font-bold mb-3 flex items-center gap-2 text-lg">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-gold">
                    <path d="M9.346 14.715l... " />
                    <path fill-rule="evenodd" d="M9 4.5a.75.75 0 01.721.544l.813 2.846a3.75 3.75 0 002.576 2.576l2.846.813a.75.75 0 010 1.442l-2.846.813a3.75 3.75 0 00-2.576 2.576l-.813 2.846a.75.75 0 01-1.442 0l-.813-2.846a3.75 3.75 0 00-2.576-2.576l-2.846-.813a.75.75 0 010-1.442l2.846-.813A3.75 3.75 0 007.466 7.89l.813-2.846A.75.75 0 019 4.5zM18 1.5a.75.75 0 01.728.568l.258 1.036c.236.94.97 1.674 1.91 1.91l1.036.258a.75.75 0 010 1.456l-1.036.258c-.94.236-1.674.97-1.91 1.91l-.258 1.036a.75.75 0 01-1.456 0l-.258-1.036a2.625 2.625 0 00-1.91-1.91l-1.036-.258a.75.75 0 010-1.456l1.036-.258a2.625 2.625 0 001.91-1.91l.258-1.036A.75.75 0 0118 1.5z" clip-rule="evenodd" />
                </svg>
                اطلب بالذكاء الاصطناعي
            </h2>
            <textarea id="aiInput" placeholder="اكتب طلبك براحتك، مثلا: بدي 2 قهوة وسط وواحد شاي..." class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-white placeholder-white/60 focus:outline-none focus:border-gold resize-none" rows="2"></textarea>
            <button onclick="sendAIOrder()" class="mt-3 w-full bg-gold text-navy font-bold py-3 rounded-xl hover:bg-yellow-400 transition-colors shadow-lg shadow-gold/20">إرسال الطلب السريع</button>
        </div>

        <div>
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide" id="categoryButtons">
                <button onclick="filterMenu('all')" id="btn_all" class="cat-btn bg-navy text-white px-5 py-2 rounded-full whitespace-nowrap text-sm font-bold shadow-md transition">الكل</button>
                <button onclick="filterMenu('cat_hot')" id="btn_cat_hot" class="cat-btn bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-full whitespace-nowrap text-sm hover:bg-gray-50 transition">☕ ساخن</button>
                <button onclick="filterMenu('cat_cold')" id="btn_cat_cold" class="cat-btn bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-full whitespace-nowrap text-sm hover:bg-gray-50 transition">🥤 بارد</button>
                <button onclick="filterMenu('cat_sandwiches')" id="btn_cat_sandwiches" class="cat-btn bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-full whitespace-nowrap text-sm hover:bg-gray-50 transition">🥪 سندويشات</button>
                <button onclick="filterMenu('cat_choc')" id="btn_cat_choc" class="cat-btn bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-full whitespace-nowrap text-sm hover:bg-gray-50 transition">🍫 شوكلاتة</button>
                <button onclick="filterMenu('cat_chips')" id="btn_cat_chips" class="cat-btn bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-full whitespace-nowrap text-sm hover:bg-gray-50 transition">🍟 شبسي</button>
            </div>
        </div>

        <div id="menuContainer" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <div id="cartBar" class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] transform translate-y-full transition-transform duration-300">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-xs text-gray-500 font-bold">المجموع</span>
                <span id="totalPrice" class="font-bold text-2xl text-navy">0 ₪</span>
            </div>
            <button onclick="confirmOrder()" class="bg-navy text-white px-8 py-3.5 rounded-xl font-bold shadow-lg hover:bg-opacity-90 transition-all flex items-center gap-3">
                تأكيد الطلب 
                <span id="cartCount" class="bg-gold text-navy w-6 h-6 rounded-full flex items-center justify-center text-sm">0</span>
            </button>
        </div>
    </div>

    <script>
        // دمج كافة الأصناف من كود البايثون السابق مع أقسامها وأسعارها
        const menuItems = [
            // مشروبات ساخنة
            { id: 'h1', name: 'شاي', price: 1, category: 'cat_hot' },
            { id: 'h2', name: 'قهوة مزاج وسط', price: 2, category: 'cat_hot' },
            { id: 'h3', name: 'قهوة مزاج كبير', price: 3, category: 'cat_hot' },
            { id: 'h4', name: 'نسكافيه مكس', price: 2, category: 'cat_hot' },
            { id: 'h5', name: 'كفي مكس', price: 2, category: 'cat_hot' },
            { id: 'h6', name: 'كابتشينو جوداي', price: 3, category: 'cat_hot' },
            
            // مشروبات باردة
            { id: 'c1', name: 'كوكاكولا', price: 4, category: 'cat_cold' },
            { id: 'c2', name: 'بلو أزرق', price: 4, category: 'cat_cold' },
            { id: 'c3', name: 'مراعي حليب شوكلاتة', price: 2, category: 'cat_cold' },
            { id: 'c4', name: 'عصير كوكتيل فواكه', price: 2, category: 'cat_cold' },
            { id: 'c5', name: 'لتر عصير برتقال', price: 7, category: 'cat_cold' },
            { id: 'c6', name: 'لتر عصير مانجا', price: 7, category: 'cat_cold' },
            
            // سندويشات
            { id: 's1', name: 'سندويش فينو فيتا', price: 3, category: 'cat_sandwiches' },
            { id: 's2', name: 'سندويش فينو مرتديلا', price: 3, category: 'cat_sandwiches' },
            
            // شوكلاتة وتسالي
            { id: 'ch1', name: 'سنيكرز', price: 3, category: 'cat_choc' },
            { id: 'ch2', name: 'تويكس', price: 3, category: 'cat_choc' },
            { id: 'ch3', name: 'مارس', price: 3, category: 'cat_choc' },
            { id: 'ch4', name: 'مستر بايت', price: 4, category: 'cat_choc' },
            { id: 'ch5', name: 'قسماط حجم وسط', price: 4, category: 'cat_choc' },
            { id: 'ch6', name: 'بسكويت مالح', price: 2, category: 'cat_choc' },
            { id: 'ch7', name: 'بسكويت ديمة فانيلا', price: 2, category: 'cat_choc' },
            { id: 'ch8', name: 'مولتو ميني', price: 2, category: 'cat_choc' },
            { id: 'ch9', name: 'شكلاتة تجارية ب 2شيكل', price: 2, category: 'cat_choc' },
            { id: 'ch10', name: 'شكلاتة تجارية ب 1 شيكل', price: 1, category: 'cat_choc' },
            { id: 'ch11', name: 'حلو نعنع سكوتش', price: 1, category: 'cat_choc' },
            
            // شبسي
            { id: 'cp1', name: 'برنجلز أحمر صغير', price: 6, category: 'cat_chips' },
            { id: 'cp2', name: 'برنجلز أحمر كبير', price: 11, category: 'cat_chips' },
            { id: 'cp3', name: 'برنجلز أحمر كبير شطة', price: 11, category: 'cat_chips' },
            { id: 'cp4', name: 'كيك فراولة', price: 7, category: 'cat_chips' }
        ];

        let cart = {};
        let currentCategory = 'all';

        // دالة الفلترة وتلوين الزر النشط
        function filterMenu(category) {
            currentCategory = category;
            
            // تحديث ستايل الأزرار
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => {
                btn.classList.remove('bg-navy', 'text-white', 'shadow-md');
                btn.classList.add('bg-white', 'text-gray-600');
            });

            const activeBtn = document.getElementById('btn_' + category);
            activeBtn.classList.remove('bg-white', 'text-gray-600');
            activeBtn.classList.add('bg-navy', 'text-white', 'shadow-md');

            renderMenu();
        }

        // دالة عرض الأصناف بناءً على القسم النشط
        function renderMenu() {
            const container = document.getElementById('menuContainer');
            container.innerHTML = '';

            const filteredItems = currentCategory === 'all' 
                ? menuItems 
                : menuItems.filter(item => item.category === currentCategory);

            filteredItems.forEach(item => {
                const quantity = cart[item.id] || 0;
                
                let buttonHTML = '';
                if (quantity > 0) {
                    buttonHTML = `
                        <div class="mt-4 w-full flex items-center justify-between bg-navy text-white py-1.5 px-3 rounded-xl font-bold text-sm">
                            <button onclick="updateCart('${item.id}', -1)" class="p-1 hover:text-gold w-8 h-8 flex items-center justify-center text-xl">-</button>
                            <span>${quantity}</span>
                            <button onclick="updateCart('${item.id}', 1)" class="p-1 hover:text-gold w-8 h-8 flex items-center justify-center text-xl">+</button>
                        </div>
                    `;
                } else {
                    buttonHTML = `
                        <button onclick="updateCart('${item.id}', 1)" class="mt-4 w-full border-2 border-navy text-navy font-bold py-2 rounded-xl hover:bg-navy hover:text-white transition-colors text-sm flex justify-center items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
                            إضافة
                        </button>
                    `;
                }

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between hover:shadow-md transition">
                        <div>
                            <h3 class="font-bold text-gray-800">${item.name}</h3>
                            <p class="text-gold font-bold text-lg mt-1">${item.price} ₪</p>
                        </div>
                        ${buttonHTML}
                    </div>
                `;
            });
        }

        // دالة تحديث سلة المشتريات
        function updateCart(itemId, change) {
            if (!cart[itemId]) cart[itemId] = 0;
            cart[itemId] += change;
            
            if (cart[itemId] <= 0) {
                delete cart[itemId];
            }
            
            renderMenu();
            updateCartBar();
        }

        // دالة تحديث شريط الأسفل
        function updateCartBar() {
            let totalQty = 0;
            let totalPrice = 0;

            for (const [id, qty] of Object.entries(cart)) {
                const item = menuItems.find(i => i.id === id);
                totalQty += qty;
                totalPrice += (item.price * qty);
            }

            document.getElementById('cartCount').innerText = totalQty;
            document.getElementById('totalPrice').innerText = totalPrice + ' ₪';

            const cartBar = document.getElementById('cartBar');
            if (totalQty > 0) {
                cartBar.classList.remove('translate-y-full');
            } else {
                cartBar.classList.add('translate-y-full');
            }
        }

        // دالة تأكيد الطلب
        function confirmOrder() {
            const office = document.getElementById('officeNumber').value;
            if (!office) {
                alert("الرجاء إدخال رقم مكتبك أولاً!");
                return;
            }
            
            let orderDetails = [];
            for (const [id, qty] of Object.entries(cart)) {
                const item = menuItems.find(i => i.id === id);
                orderDetails.push(`${qty} ${item.name}`);
            }
            
            alert("سيتم إرسال الطلب للمكتب: " + office + "\\nالأصناف: " + orderDetails.join("، "));
        }

        // دالة إرسال طلب الذكاء الاصطناعي
        function sendAIOrder() {
            const aiText = document.getElementById('aiInput').value;
            if (!aiText) return alert("الرجاء كتابة طلبك أولاً");
            alert("سيتم معالجة الطلب بالذكاء الاصطناعي: " + aiText);
        }

        // التهيئة الأولية
        renderMenu();
    </script>
</body>
</html>
