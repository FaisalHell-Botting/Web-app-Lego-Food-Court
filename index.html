<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LE Coffee | كوفي كورنر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { navy: '#2E3468', gold: '#F7CC46' }, fontFamily: { sans: ['Cairo', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #F8F9FA; }
        .hidden { display: none !important; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
        .tab-active { background: #2E3468; color: white !important; }
    </style>
</head>
<body class="pb-32 bg-[#F8F9FA]">

<div id="authScreen" class="fixed inset-0 bg-navy z-[100] flex flex-col items-center justify-center p-6 text-white text-center">
    <div class="mb-8">
        <img src="logo.png" alt="LE Coffee Logo" class="w-32 h-32 mx-auto mb-4 object-contain">
        <h1 class="text-3xl font-black tracking-wide">LE Coffee</h1>
    </div>
    <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-navy shadow-2xl">
        <input type="text" id="loginOffice" placeholder="رقم المكتب (مثلاً: 15)" class="w-full border-2 border-gray-200 p-3.5 rounded-xl mb-4 text-center font-bold text-lg focus:outline-none focus:border-navy">
        <button onclick="login('office')" class="w-full bg-navy text-white font-bold py-3.5 rounded-xl mb-3 shadow-lg hover:bg-opacity-90 transition-all text-base">🏢 دخول بالمكتب</button>
        <button onclick="login('guest')" class="w-full border-2 border-gold text-gold font-bold py-3.5 rounded-xl hover:bg-yellow-50 transition-all text-base">🚶 دخول كزائر</button>
    </div>
</div>

<header id="mainHeader" class="bg-white shadow-sm sticky top-0 z-40 hidden">
    <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <img src="logo.png" alt="Logo" class="h-8 object-contain">
            <span class="font-black text-navy text-sm">LE Coffee</span>
        </div>
        <button onclick="toggleLedger()" class="text-xs font-bold text-navy bg-gray-100 px-3 py-1.5 rounded-full hover:bg-gray-200">📋 ديوني (<span id="userTotalDebtHeader">0</span> ₪)</button>
    </div>
</header>

<main id="mainScreen" class="max-w-md mx-auto px-4 hidden">
    <div id="activeOrderBanner" class="mt-4 mb-4 hidden">
        <div class="bg-blue-50 border-2 border-blue-200 p-4 rounded-2xl shadow-sm slide-up">
            <div class="flex justify-between items-start mb-2">
                <span id="activeOrderStatus" class="font-bold text-blue-800 text-sm">⏳ طلبك قيد الانتظار...</span>
                <span id="activeOrderPrice" class="font-black text-navy"></span>
            </div>
            <p id="activeOrderText" class="text-sm text-navy mb-3 font-bold bg-white p-2 rounded-xl border"></p>
            <button onclick="cancelOrder()" class="w-full bg-red-100 text-red-600 py-2 rounded-xl text-sm font-bold hover:bg-red-200">🗑️ إلغاء الطلب</button>
        </div>
    </div>

    <div class="flex gap-2 mt-4 mb-4">
        <button id="tabMenu" onclick="switchOrderMode('menu')" class="tab-active flex-1 py-2.5 rounded-xl text-sm font-bold border">🍽️ المنيو</button>
        <button id="tabAI" onclick="switchOrderMode('ai')" class="flex-1 py-2.5 rounded-xl text-sm font-bold text-gray-500 border">🤖 اطلب بالكتابة</button>
    </div>

    <div id="menuMode"><div id="menuContainer" class="grid grid-cols-2 gap-3 mb-4"></div></div>
    
    <div id="aiMode" class="hidden">
        <div class="bg-white rounded-2xl border p-4 mb-4">
            <input type="text" id="chatInput" placeholder="مثال: بدي قهوة و 2 سنيكرز..." class="w-full border rounded-xl px-3 py-2 text-sm mb-2">
            <button onclick="sendAIOrder()" class="w-full bg-navy text-white px-4 py-2 rounded-xl text-sm font-bold">إرسال للذكاء الاصطناعي</button>
        </div>
    </div>
</main>

<div id="cartModal" class="fixed inset-0 bg-black/50 z-50 hidden flex-col justify-end">
    <div class="bg-white rounded-t-3xl p-6 slide-up">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-lg">سلة الطلبات</h3>
            <button onclick="document.getElementById('cartModal').classList.add('hidden')" class="text-gray-500">❌</button>
        </div>
        <div id="cartItemsList" class="space-y-2 mb-4 max-h-40 overflow-y-auto"></div>
        
        <div class="mb-4">
            <p class="text-sm font-bold mb-2">مكان الاستلام:</p>
            <div class="flex gap-2">
                <label class="flex-1 border p-2 rounded-xl text-center cursor-pointer">
                    <input type="radio" name="deliveryType" value="داخل الكفي كورنر" checked class="hidden peer">
                    <div class="peer-checked:bg-navy peer-checked:text-white rounded-lg p-1 text-sm transition-colors">داخل الكفي</div>
                </label>
                <label id="deliveryOptionWrapper" class="flex-1 border p-2 rounded-xl text-center cursor-pointer">
                    <input type="radio" name="deliveryType" value="توصيل عالمكتب" class="hidden peer">
                    <div class="peer-checked:bg-navy peer-checked:text-white rounded-lg p-1 text-sm transition-colors">توصيل للمكتب</div>
                </label>
            </div>
            <p id="sandwichWarning" class="text-xs text-red-500 mt-1 hidden">طلب السندويشات متوفر داخل الكفي كورنر فقط</p>
        </div>

        <button onclick="confirmOrder()" class="w-full bg-gold text-navy font-black py-3 rounded-xl">تأكيد الطلب (<span id="cartTotalBtn">0</span> ₪)</button>
    </div>
</div>

<div id="ledgerModal" class="fixed inset-0 bg-black/50 z-50 hidden flex-col justify-end">
    <div class="bg-white rounded-t-3xl p-6 slide-up h-[80vh] flex flex-col">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-lg">📋 سجل ديوني</h3>
            <button onclick="document.getElementById('ledgerModal').classList.add('hidden')" class="text-gray-500">❌</button>
        </div>
        <div class="bg-red-50 text-red-600 p-4 rounded-xl text-center mb-4 font-black text-xl">
            إجمالي الدين: <span id="modalTotalDebt">0</span> ₪
        </div>
        
        <div id="paymentSection" class="hidden bg-blue-50 border border-blue-200 p-4 rounded-xl mb-4">
            <p class="font-bold text-blue-800 text-sm mb-2">🔔 الإدارة تطلب تسديد الرصيد المستحق</p>
            <div class="text-xs text-gray-700 bg-white p-2 rounded border mb-3">
                <p>الرجاء تحويل المبلغ على محفظة جوال باي: 0599000000</p>
                <p>أو التسديد النقدي للكاشير وإرفاق صورة هنا.</p>
            </div>
            <input type="file" id="receiptImage" class="w-full text-xs mb-2 bg-white p-1 rounded" accept="image/*">
            <button onclick="submitPayment()" class="w-full bg-blue-600 text-white py-2 rounded-xl text-sm font-bold">📤 إرسال إيصال الدفع</button>
        </div>

        <h4 class="font-bold text-sm mb-2 border-b pb-1">التفاصيل السابقة:</h4>
        <div id="debtLogList" class="flex-1 overflow-y-auto space-y-3"></div>
    </div>
</div>

<script>
    const API_URL = 'https://web-app-lego-food-court.onrender.com/api'; // ضع رابط الرندر هنا
    const MENU = [
        {id: "h2", name: "قهوة مزاج وسط", price: 2, cat: "hot"},
        {id: "s1", name: "سندويش فينو فيتا", price: 3, cat: "snack"}
        // أكمل باقي المنيو هنا
    ];
    let cart = {};
    let currentUser = null;
    let currentOrderId = null;
    let debtAmount = 0;

    function login(type) {
        let office = document.getElementById('loginOffice').value;
        if(type === 'office' && !office) return alert("أدخل رقم المكتب");
        currentUser = { type, office: type==='office'? office : 'زائر' };
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('mainHeader').classList.remove('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
        document.getElementById('userBadge').innerText = currentUser.office;
        
        renderMenu();
        if(type === 'office') fetchUserData();
    }

    function renderMenu() {
        let html = '';
        MENU.forEach(item => {
            let qty = cart[item.id] ? cart[item.id].qty : 0;
            html += `<div class="bg-white p-3 rounded-xl border flex flex-col justify-between">
                <div class="font-bold text-sm">${item.name}</div>
                <div class="text-gold font-black">${item.price} ₪</div>
                ${qty === 0 
                    ? `<button onclick="addToCart('${item.id}', '${item.name}', ${item.price}, '${item.cat}')" class="mt-2 bg-gray-100 text-navy text-xs font-bold py-1 rounded">إضافة</button>`
                    : `<div class="flex justify-between items-center mt-2 bg-navy text-white rounded px-2 py-1"><button onclick="updateCart('${item.id}', -1)">-</button><span>${qty}</span><button onclick="updateCart('${item.id}', 1)">+</button></div>`
                }
            </div>`;
        });
        document.getElementById('menuContainer').innerHTML = html;
        updateCartUI();
    }

    function addToCart(id, name, price, cat) { cart[id] = {name, price, qty: 1, cat}; renderMenu(); }
    function updateCart(id, delta) { cart[id].qty += delta; if(cart[id].qty <= 0) delete cart[id]; renderMenu(); }
    
    function updateCartUI() {
        let total = Object.values(cart).reduce((sum, i) => sum + (i.price * i.qty), 0);
        let hasSnack = Object.values(cart).some(i => i.cat === 'snack');
        
        // Show cart floating button if total > 0 (Code omitted for brevity, you can trigger cartModal manually or via a button)
        if(total > 0) showCartModal(); // Auto show for testing, usually a bottom bar
    }

    function showCartModal() {
        let total = 0;
        let html = '';
        let hasSnack = false;
        Object.values(cart).forEach(item => {
            total += item.price * item.qty;
            if(item.cat === 'snack') hasSnack = true;
            html += `<div class="flex justify-between border-b pb-1"><span class="text-sm">${item.qty}x ${item.name}</span><span class="font-bold">${item.price * item.qty}₪</span></div>`;
        });
        
        document.getElementById('cartItemsList').innerHTML = html;
        document.getElementById('cartTotalBtn').innerText = total;
        
        let deliveryWrapper = document.getElementById('deliveryOptionWrapper');
        let warning = document.getElementById('sandwichWarning');
        if(hasSnack) {
            deliveryWrapper.style.opacity = '0.5';
            deliveryWrapper.style.pointerEvents = 'none';
            document.querySelector('input[name="deliveryType"][value="داخل الكفي كورنر"]').checked = true;
            warning.classList.remove('hidden');
        } else {
            deliveryWrapper.style.opacity = '1';
            deliveryWrapper.style.pointerEvents = 'auto';
            warning.classList.add('hidden');
        }
        
        if(total > 0) document.getElementById('cartModal').classList.remove('hidden');
    }

    async function confirmOrder() {
        let deliveryType = document.querySelector('input[name="deliveryType"]:checked').value;
        let items = Object.values(cart).map(i => ({name: i.name, qty: i.qty}));
        let total = Object.values(cart).reduce((sum, i) => sum + (i.price * i.qty), 0);
        
        let res = await fetch(`${API_URL}/api/order`, {
            method: 'POST', headers:{'Content-Type': 'application/json'},
            body: JSON.stringify({location: currentUser.office, items, totalPrice: total, isGuest: currentUser.type==='guest', deliveryType})
        });
        let data = await res.json();
        if(data.status === 'success') {
            cart = {}; renderMenu();
            document.getElementById('cartModal').classList.add('hidden');
            fetchUserData();
        }
    }

    async function fetchUserData() {
        if(currentUser.type !== 'office') return;
        let res = await fetch(`${API_URL}/api/user/data?office=${currentUser.office}`);
        let data = await res.json();
        
        debtAmount = data.total_debt || 0;
        document.getElementById('userTotalDebtHeader').innerText = debtAmount;
        document.getElementById('modalTotalDebt').innerText = debtAmount;
        
        // Active Orders Display
        if(data.active_orders && data.active_orders.length > 0) {
            let active = data.active_orders[0];
            currentOrderId = active.id;
            document.getElementById('activeOrderBanner').classList.remove('hidden');
            document.getElementById('activeOrderStatus').innerText = active.status;
            document.getElementById('activeOrderPrice').innerText = active.total + " ₪";
            let txt = active.items.map(i => `${i.qty}x ${i.name}`).join(' ، ');
            document.getElementById('activeOrderText').innerText = txt;
        } else {
            document.getElementById('activeOrderBanner').classList.add('hidden');
            currentOrderId = null;
        }
        
        // Ledger Log
        if(data.debts_list) {
            let html = '';
            data.debts_list.forEach(d => {
                let itemsTxt = d.items.map(i => `${i.qty}x ${i.name}`).join('، ');
                html += `<div class="bg-gray-50 p-3 rounded-xl border text-sm">
                    <div class="flex justify-between font-bold mb-1"><span>${d.date}</span><span class="text-red-500">${d.total} ₪</span></div>
                    <div class="text-gray-600 text-xs">${itemsTxt}</div>
                </div>`;
            });
            document.getElementById('debtLogList').innerHTML = html || '<p class="text-center text-gray-400">لا يوجد سجل</p>';
        }
        
        // Notification & Payment Request
        if(data.has_reminder && debtAmount > 0) {
            document.getElementById('paymentSection').classList.remove('hidden');
            if(!sessionStorage.getItem('reminded')) {
                alert(`تذكير: لديك مبلغ مستحق (${debtAmount} ₪). يرجى التسديد.`);
                sessionStorage.setItem('reminded', 'true');
                toggleLedger();
            }
        } else {
            document.getElementById('paymentSection').classList.add('hidden');
        }
    }

    async function cancelOrder() {
        if(!currentOrderId) return;
        await fetch(`${API_URL}/api/admin/action`, {
            method: 'POST', headers:{'Content-Type': 'application/json'},
            body: JSON.stringify({action: 'cancel', order_id: currentOrderId})
        });
        fetchUserData();
    }

    async function submitPayment() {
        let fileInput = document.getElementById('receiptImage');
        if(!fileInput.files[0]) return alert('يرجى إرفاق صورة الإيصال');
        
        let formData = new FormData();
        formData.append("office", currentUser.office);
        formData.append("amount", debtAmount);
        formData.append("file", fileInput.files[0]);
        
        await fetch(`${API_URL}/api/user/pay_debt`, { method: 'POST', body: formData });
        alert('تم إرسال الإيصال للإدارة بنجاح بانتظار التأكيد.');
        document.getElementById('ledgerModal').classList.add('hidden');
        fetchUserData();
    }

    function toggleLedger() {
        document.getElementById('ledgerModal').classList.toggle('hidden');
    }
    
    function switchOrderMode(mode) {
        document.getElementById('menuMode').classList.toggle('hidden', mode !== 'menu');
        document.getElementById('aiMode').classList.toggle('hidden', mode !== 'ai');
    }
    
    async function sendAIOrder() {
        let txt = document.getElementById('chatInput').value;
        if(!txt) return;
        let res = await fetch(`${API_URL}/api/ai_order`, {
            method: 'POST', headers:{'Content-Type': 'application/json'}, body: JSON.stringify({text: txt})
        });
        let data = await res.json();
        if(data.status === 'success' && data.items) {
            // Fill cart from AI
            data.items.forEach(i => {
                let match = MENU.find(m => m.name === i.name);
                if(match) addToCart(match.id, match.name, match.price, match.cat);
            });
            switchOrderMode('menu');
        }
    }

    // Polling
    setInterval(fetchUserData, 10000);
</script>
</body>
</html>
